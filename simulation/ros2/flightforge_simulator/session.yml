name: docker
root: ./
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
startup_window: lazydocker
windows:
  - lazydocker:
      layout: 6102,174x53,0,0[174x38,0,0,0,174x14,0,39,5]
      panes:
        - lazydocker
        - export UAV_NAME=uav1; ros2 run mrs_uav_status status.sh
  - compose:
      layout: tiled
      panes:
        - cd uav && ./up.sh
